<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.row{gap:18px; flex-wrap:wrap;}
.card { width:90px; height:90px; background:#0d1117; border:1px solid rgba(255,255,255,0.07); display:flex; align-items:center; justify-content:center; color:#e8eaf0; font-family:'DM Mono',monospace; font-size:11px; }
.pill { width:120px; height:36px; background:#161b27; border:1px solid rgba(255,255,255,0.07); border-radius:100px; display:flex; align-items:center; justify-content:center; font-family:'DM Mono',monospace; font-size:11px; color:#e8eaf0; }
.lbl { font-family:'DM Mono',monospace; font-size:9px; color:#6b7280; text-transform:uppercase; letter-spacing:0.08em; margin-top:6px; text-align:center; }
.col2 { display:flex; flex-direction:column; align-items:center; }
</style></head><body><div class="inner">
<div class="row">
  <div class="col2"><div class="card" style="border-radius:6px">6</div><div class="lbl">r-xs · tag</div></div>
  <div class="col2"><div class="card" style="border-radius:8px">8</div><div class="lbl">r-sm · btn</div></div>
  <div class="col2"><div class="card" style="border-radius:12px">12</div><div class="lbl">r-md · tech</div></div>
  <div class="col2"><div class="card" style="border-radius:16px">16</div><div class="lbl">r-lg · stat</div></div>
  <div class="col2"><div class="card" style="border-radius:20px">20</div><div class="lbl">r-xl · achieve</div></div>
  <div class="col2"><div class="pill">pill</div><div class="lbl">r-pill · badge</div></div>
</div>
</div></body></html>
