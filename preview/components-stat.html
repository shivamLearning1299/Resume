<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.row{gap:14px; flex-wrap:wrap;}
.stat { min-width:150px; padding:24px 32px; background:#0d1117; border:1px solid rgba(255,255,255,0.07); border-radius:16px; position:relative; overflow:hidden; text-align:center; }
.stat::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(79,142,247,0.05),transparent); }
.num { font-family:'Syne',sans-serif; font-size:36px; font-weight:800; background:linear-gradient(135deg,#4f8ef7,#06d6a0); -webkit-background-clip:text; -webkit-text-fill-color:transparent; display:block; position:relative; }
.cap { font-family:'DM Mono',monospace; font-size:11px; color:#6b7280; position:relative; }
</style></head><body><div class="inner row">
  <div class="stat"><span class="num">4+</span><span class="cap">years_experience</span></div>
  <div class="stat"><span class="num">2×</span><span class="cap">gem_award_winner</span></div>
  <div class="stat"><span class="num">2.5M</span><span class="cap">docs_synced</span></div>
</div></body></html>
