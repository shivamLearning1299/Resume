<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.tech-grid { display:grid; grid-template-columns: repeat(4,1fr); gap:12px; }
.tech-card { background:#0d1117; border:1px solid rgba(255,255,255,0.07); border-radius:12px; padding:16px; display:flex; align-items:center; gap:10px; }
.tech-card.h { border-color:rgba(79,142,247,0.4); transform: translateY(-3px); background: linear-gradient(135deg, rgba(79,142,247,0.05), #0d1117); }
.icon { font-size:20px; }
.name { font-family:'Inter',sans-serif; font-size:13px; font-weight:500; color:#e8eaf0; }
</style></head><body><div class="inner">
<div class="tech-grid">
  <div class="tech-card"><span class="icon">🟨</span><span class="name">JavaScript</span></div>
  <div class="tech-card h"><span class="icon">🐍</span><span class="name">Python</span></div>
  <div class="tech-card"><span class="icon">🟢</span><span class="name">Node.js</span></div>
  <div class="tech-card"><span class="icon">🐳</span><span class="name">Docker</span></div>
</div>
</div></body></html>
