<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.row{gap:24px; align-items:flex-start;}
.scale{display:flex; flex-direction:column; align-items:flex-start;}
.block { background: linear-gradient(135deg, rgba(79,142,247,0.2), rgba(124,58,237,0.2)); border:1px solid rgba(79,142,247,0.3); border-radius:8px; }
.lbl{ font-family:'DM Mono',monospace; font-size:10px; color:#6b7280; margin-top:6px; }
</style></head><body><div class="inner">
<div class="row">
  <div class="scale"><div class="block" style="width:4px;height:24px"></div><div class="lbl">4</div></div>
  <div class="scale"><div class="block" style="width:8px;height:24px"></div><div class="lbl">8</div></div>
  <div class="scale"><div class="block" style="width:12px;height:24px"></div><div class="lbl">12</div></div>
  <div class="scale"><div class="block" style="width:16px;height:24px"></div><div class="lbl">16</div></div>
  <div class="scale"><div class="block" style="width:24px;height:24px"></div><div class="lbl">24</div></div>
  <div class="scale"><div class="block" style="width:32px;height:24px"></div><div class="lbl">32</div></div>
  <div class="scale"><div class="block" style="width:48px;height:24px"></div><div class="lbl">48</div></div>
  <div class="scale"><div class="block" style="width:64px;height:24px"></div><div class="lbl">64</div></div>
  <div class="scale"><div class="block" style="width:96px;height:24px"></div><div class="lbl">96</div></div>
  <div class="scale"><div class="block" style="width:120px;height:24px"></div><div class="lbl">120 / section</div></div>
</div>
</div></body></html>
