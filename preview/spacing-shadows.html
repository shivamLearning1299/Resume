<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.row{gap:22px; flex-wrap:wrap; align-items:flex-end;}
.col2{display:flex; flex-direction:column; align-items:center; gap:8px;}
.btn{padding:12px 24px; border-radius:8px; font-family:'DM Mono',monospace; font-size:13px; color:#fff; background:linear-gradient(135deg,#4f8ef7,#7c3aed); box-shadow: 0 8px 30px rgba(79,142,247,0.35);}
.dot{width:14px; height:14px; border-radius:50%; background:#4f8ef7; box-shadow: 0 0 12px #4f8ef7;}
.dot2{background:#06d6a0; box-shadow: 0 0 12px #06d6a0;}
.avatar{width:90px; height:90px; border-radius:50%; background:linear-gradient(145deg,#1a1f35,#0d1117); border:2px solid rgba(79,142,247,0.5); box-shadow: 0 0 30px rgba(79,142,247,0.2), 0 0 60px rgba(124,58,237,0.1);}
.lbl { font-family:'DM Mono',monospace; font-size:9px; color:#6b7280; text-transform:uppercase; letter-spacing:0.08em; }
</style></head><body><div class="inner">
<div class="row">
  <div class="col2"><div class="btn">Get in touch</div><div class="lbl">btn: 0 8px 30px accent</div></div>
  <div class="col2"><div class="dot"></div><div class="lbl">dot glow blue</div></div>
  <div class="col2"><div class="dot dot2"></div><div class="lbl">dot glow mint</div></div>
  <div class="col2"><div class="avatar"></div><div class="lbl">layered 40/80px</div></div>
</div>
</div></body></html>
