<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.wrap{display:flex; gap:28px; align-items:center; height:180px; justify-content:center; background:#050810; border-radius:14px; border:1px solid rgba(255,255,255,0.07); padding: 10px;}

.logo-md { font-family:'Syne',sans-serif; font-size:36px; font-weight:800; background:linear-gradient(135deg,#4f8ef7,#7c3aed); -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing:-1.2px; line-height:1; }

</style></head><body><div class="inner">

</div></body></html>
