<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.tl { position:relative; padding-left:20px; }
.tl::before { content:''; position:absolute; left:0; top:0; bottom:0; width:1px; background: linear-gradient(to bottom,#4f8ef7,#7c3aed,transparent); }
.card { position:relative; padding-left:28px; }
.dot { position:absolute; left:-5px; top:6px; width:11px; height:11px; border-radius:50%; background:#06d6a0; border:2px solid #050810; box-shadow: 0 0 12px #06d6a0; }
.meta { display:flex; align-items:center; gap:14px; margin-bottom:6px; }
.co { font-family:'Syne',sans-serif; font-size:18px; font-weight:700; color:#e8eaf0; }
.per { font-family:'DM Mono',monospace; font-size:11px; color:#6b7280; background:#161b27; padding:3px 10px; border-radius:100px; border:1px solid rgba(255,255,255,0.07); }
.role { font-family:'DM Mono',monospace; font-size:12px; color:#4f8ef7; margin-bottom:10px; }
.li { padding-left:18px; position:relative; color:rgba(232,234,240,0.75); font-size:13px; line-height:1.6; }
.li::before { content:'▸'; position:absolute; left:0; color:#06d6a0; font-size:10px; top:3px; }
</style></head><body><div class="inner">
<div class="tl">
  <div class="card">
    <div class="dot"></div>
    <div class="meta"><span class="co">Trajector</span><span class="per">Apr 2025 – Present</span></div>
    <div class="role">Software Engineer II · Gurgaon</div>
    <div class="li">Python-based AI agents for task extraction and workflow automation.</div>
  </div>
</div>
</div></body></html>
