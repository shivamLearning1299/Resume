<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.grid { display:grid; grid-template-columns: repeat(4,1fr); gap:14px; }
.swatch { display:flex; flex-direction:column; gap:6px; }
.chip { width:100%; height:58px; border-radius:12px; border:1px solid var(--border); }
.name { font-family: var(--font-mono); font-size:10px; color: var(--muted); text-transform: uppercase; letter-spacing:0.1em; }
.hex { font-family: var(--font-mono); font-size:11px; color: var(--text); }
</style></head><body><div class="inner">
<div class="grid">
  <div class="swatch"><div class="chip" style="background:#050810"></div><div class="name">bg</div><div class="hex">#050810</div></div>
  <div class="swatch"><div class="chip" style="background:#0d1117"></div><div class="name">surface</div><div class="hex">#0D1117</div></div>
  <div class="swatch"><div class="chip" style="background:#161b27"></div><div class="name">surface2</div><div class="hex">#161B27</div></div>
  <div class="swatch"><div class="chip" style="background:#1e2540"></div><div class="name">surface3</div><div class="hex">#1E2540</div></div>
</div>
</div></body></html>
