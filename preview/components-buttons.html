<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.row{gap:16px; flex-wrap:wrap;}
.btn { padding:12px 28px; border-radius:8px; font-family:'DM Mono',monospace; font-size:13px; font-weight:500; cursor:pointer; border:none; }
.primary { background: linear-gradient(135deg,#4f8ef7,#7c3aed); color:#fff; box-shadow: 0 8px 30px rgba(79,142,247,0.35); }
.secondary { background: transparent; color:#e8eaf0; border:1px solid rgba(255,255,255,0.07); }
.secondary-h { background: transparent; color:#4f8ef7; border:1px solid #4f8ef7; }
.lbl { font-family:'DM Mono',monospace; font-size:9px; color:#6b7280; text-transform:uppercase; letter-spacing:0.08em; margin-top:8px; text-align:center; }
.col2 { display:flex; flex-direction:column; align-items:center; }
</style></head><body><div class="inner">
<div class="row">
  <div class="col2"><button class="btn primary">Get in touch</button><div class="lbl">primary</div></div>
  <div class="col2"><button class="btn secondary">View experience ↓</button><div class="lbl">secondary · rest</div></div>
  <div class="col2"><button class="btn secondary-h">View experience ↓</button><div class="lbl">secondary · hover</div></div>
</div>
</div></body></html>
